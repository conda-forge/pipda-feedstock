schema_version: 1

context:
  name: pipda
  version: "0.14.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pipda-${{ version }}.tar.gz
  sha256: 03d2f4e9e9e24ed3976342205d6f64c014918fc26acc0b5d9f496a5192e393eb

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - hatchling
    - python ${{ python_min }}.*
  run:
    - executing >=2.0
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - pipda
      pip_check: true
      python_version:
        - ${{ python_min }}
        - "*"

about:
  summary: A framework for data piping in python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/pwwang/pipda
  documentation: https://pwwang.github.io/pipda/api/pipda/

extra:
  recipe-maintainers:
    - thewchan
