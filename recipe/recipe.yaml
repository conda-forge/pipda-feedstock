schema_version: 1

context:
  name: pipda
  version: "0.14.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pipda-${{ version }}.tar.gz
  sha256: d64bc344f48aa2bb5bd7dad21757c586ef6fa16fa0dc4ffb4a6882c302c1365e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - hatchling
    - python ${{ python_min }}.*
  run:
    - executing >=2.0
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - pipda
      pip_check: true
      python_version:
        - ${{ python_min }}
        - "*"

about:
  summary: A framework for data piping in python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/pwwang/pipda
  documentation: https://pwwang.github.io/pipda/api/pipda/

extra:
  recipe-maintainers:
    - thewchan
